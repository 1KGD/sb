[package]
name = "starbloom"
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["John Schiefelbein"]

[dependencies]
bevy_ecs = "0.19"
macroquad = "0.4.15"
starbloom-base = { version = "0.1.0", path = "crates/starbloom-base" }
starbloom-camera = { version = "0.1.0", path = "crates/starbloom-camera" }
starbloom-intro = { version = "*", path = "crates/starbloom-intro" }
starbloom-map = { version = "0.1.0", path = "crates/starbloom-map" }

[features]
skip_intro = []
show_fps = []
web = []

dev = ["skip_intro", "show_fps"]

native_dev = ["dev"]
web_dev = ["dev", "web"]

native_release = []
web_release = ["web"]
