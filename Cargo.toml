[package]
name = "starbloom"
version = "0.1.1"
edition = "2024"
license = "MIT"
authors = ["John Schiefelbein"]

[dependencies]
bevy_ecs = {version="0.19", features=["debug"]}
macroquad = "0.4.15"
starbloom-base = { version = "*", path = "crates/starbloom-base" }
starbloom-camera = { version = "*", path = "crates/starbloom-camera" }
starbloom-intro = { version = "*", path = "crates/starbloom-intro" }
starbloom-map = { version = "*", path = "crates/starbloom-map" }
starbloom-tiles = { version = "*", path = "crates/starbloom-tiles" }
starbloom-worldgen = { version = "*", path = "crates/starbloom-worldgen" }

[features]
skip_intro = []
show_fps = []
web = []
mobile = []

dev = ["skip_intro", "show_fps"]

native_dev = ["dev"]
web_dev = ["dev", "web"]
mobile_dev = ["dev", "mobile"]

release = []

native_release = ["release"]
web_release = ["release", "web"]
mobile_release = ["release", "mobile"]

[profile.dev]
opt-level = 1

#[profile.dev.package."*"]
#opt-level = 3

[profile.wasm-release]
inherits = "release"
opt-level = "s"
strip = "debuginfo"
